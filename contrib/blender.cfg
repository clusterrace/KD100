// KD100 config tuned for Blender modelling + sculpting.
// Use with:  KD100 -c ~/.config/KD100/blender.cfg
// Layout:
//   |  Esc  | Tab   | Undo  | Redo  |
//   |   G   |   R   |   S   |   E   |
//   | Shift | Ctrl  | Alt   |  Box  |
//   | Mask  | LoopC | Bevel |       |
//   |   MMB     | Frame |Brush|   (MMB = middle mouse click)
//   dial turn = zoom in/out; dial press = View All
//
// Many keys are context-sensitive in Blender (work in both Edit and Sculpt).
// Shift/Ctrl/Alt are HOLD keys — hold them while stroking with the pen
// (Shift = smooth, Ctrl = invert brush, Alt = loop select, etc.).

// Button 0  - Escape
type: 0
function: Escape
// Button 1  - Tab: Object/Edit/Sculpt mode toggle
type: 0
function: Tab
// Button 2  - Undo
type: 0
function: ctrl+z
// Button 3  - Redo
type: 0
function: ctrl+shift+z
// Button 4  - Grab (transform) / Grab brush
type: 0
function: g
// Button 5  - Rotate
type: 0
function: r
// Button 6  - Scale / Smooth brush
type: 0
function: s
// Button 7  - Extrude
type: 0
function: e
// Button 8  - Shift  [STICKY LATCH -- see type 3 handling in KD100.c]
//   Tap once to press Shift and hold it down, tap again to release.
//   To pan in Blender, latch Shift on, then hold the big MMB key and
//   drag with the pen (Shift+MMB). The keydial reports only one key at
//   a time, so a live two-key chord is impossible; the latch works around it.
type: 3
function: shift
// Button 9  - Ctrl  [STICKY LATCH -- tap to hold Ctrl down, tap again to release]
type: 3
function: ctrl
// Button 10 - Alt  [STICKY LATCH -- tap to hold Alt down, tap again to release]
type: 3
function: alt
// Button 11 - Box select
type: 0
function: b
// Button 12 - Mask brush / Merge menu
type: 0
function: m
// Button 13 - Loop Cut (edit) / Voxel Remesh (sculpt)
type: 0
function: ctrl+r
// Button 14 - Bevel
type: 0
function: ctrl+b
// Button 15 - Middle mouse click (laptop has no middle button; = Blender orbit/pan)
type: 2
function: mouse2
// Button 16 - Frame Selected (Numpad .)  [needs Emulate Numpad OFF]
type: 0
function: KP_Decimal
// Button 17 - Brush size (F) drag / Make Face (edit)
type: 0
function: f
// Dial Button 18 - View All (frame whole scene)
type: 0
function: Home
// Wheel Clockwise - zoom in   [needs Emulate Numpad OFF]
function: KP_Add
// Wheel Counter-Clockwise - zoom out
function: KP_Subtract
